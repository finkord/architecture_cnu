services:
  payment-db:
    image: postgres:16-alpine
    container_name: payment-db
    environment:
      POSTGRES_USER: ${DB_USER:-payment_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secure_password}
      POSTGRES_DB: ${DB_NAME:-payment_service}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - payment-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  payment-mq:
    image: rabbitmq:3-management-alpine
    container_name: payment-mq
    environment:
      RABBITMQ_DEFAULT_USER: ${RMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RMQ_PASSWORD:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - payment-network
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 5s
      timeout: 5s
      retries: 5

  payment-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: payment-app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://payment_user:secure_password@payment-db:5432/payment_service}
      - RABBITMQ_URL=${RABBITMQ_URL:-amqp://guest:guest@payment-mq:5672/}
      - STRIPE_API_KEY=${STRIPE_API_KEY:-sk_test_mock}
      - API_TIMEOUT=${API_TIMEOUT:-5}
    depends_on:
      payment-db:
        condition: service_healthy
      payment-mq:
        condition: service_healthy
    networks:
      - payment-network
    volumes:
      - app-logs:/var/log/app

  payment-ui:
    image: nginx:alpine
    container_name: payment-ui
    ports:
      - "8080:80"
    volumes:
      - ./ui:/usr/share/nginx/html:ro
    networks:
      - payment-network
    depends_on:
      - payment-app

networks:
  payment-network:
    driver: bridge

volumes:
  pgdata:
  app-logs:
